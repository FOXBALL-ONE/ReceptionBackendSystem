server:
  port: 8080

management:
  # 禁用全部 actuator 端点（health/info 等在 HTTP 与 JMX 上均不可用）。
  # LoginWebConfig 虽放行 /actuator/**，但端点本身被禁用，无任何信息泄露。
  endpoints:
    enabled-by-default: false

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ReceptionBackendSystem
  # 注：鉴权完全由 LoginInterceptor（JWT）处理；SecurityConfig 关闭 httpBasic/formLogin 并 permitAll，
  # 故 Spring Security 默认用户（曾硬编码 admin/admin123）从不被使用，已移除该配置以杜绝硬编码口令。
  servlet:
    multipart:
      max-file-size: 4096MB
      max-request-size: 4096MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAXIMUM_POOL_SIZE:10}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:2000}

  jpa:
    hibernate:
      # schema 由 SystemBootstrapService 编程式管理（ddl-auto=none）：
      # - 正常已初始化启动 / 安全模式 → migrate（增量，等价 update）；
      # - 首次 / 强制初始化 → 经控制台交互确认后 drop+create（见 system.bootstrap.interactive-rebuild）。
      # 置 none 是为了让重建前的交互确认能介入，避免确认前就改库。
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true


image:
    # 图片物理存储根目录由环境变量 IMAGE_STORAGE 提供（通常写在 .env 文件中，或作为系统环境变量注入）；
    # 未设置时回退到应用程序所在目录下的 img 子目录（如 /opt/java/app.jar → /opt/java/img）。
    base-url: ${IMAGE_BASE_URL}
    storage: ${IMAGE_STORAGE}

qweather:
  base-url: ${QWEATHER_BASE_URL}
  api-key: ${QWEATHER_API_KEY}

auth:
  # 首次启动写入 users 表的默认管理员种子账号（密码入库时会被 BCrypt 哈希）。
  # 登录校验始终以 users 表为准；生产环境请通过 AUTH_USERNAME / AUTH_PASSWORD 环境变量覆盖。
  username: ${AUTH_USERNAME:admin}
  password: ${AUTH_PASSWORD:admin123}
  # JWT 签名密钥（HS256，需 ≥32 字节）：仅由环境变量 AUTH_JWT_SECRET 注入，无默认值；未设置则启动失败。
  jwt-secret: ${AUTH_JWT_SECRET}
  # 令牌有效期（分钟），默认 7 天
  jwt-expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:10080}
  # TOTP 两步验证配置
  totp:
    # authenticator 中显示的发行方名称
    issuer: 接待管理系统
    # 两步验证挑战令牌有效期（分钟）
    challenge-minutes: ${AUTH_TOTP_CHALLENGE_MINUTES:5}
    # TOTP 密钥加密密钥（经 SHA-256 派生为 AES-256）：仅由环境变量 AUTH_TOTP_ENC_KEY 注入，无默认值；未设置则启动失败。
    secret-encryption-key: ${AUTH_TOTP_ENC_KEY}

system:
  bootstrap:
    # 强制初始化模式：留空=正常（仅首次初始化）；true=强制重跑幂等初始化步骤；
    # admin-reset=额外按 auth.* 重置管理员口令。来源 SYSTEM_FORCE_INIT；处理完成后请从 .env 移除该变量。
    force-init: ${SYSTEM_FORCE_INIT:}
    # 审计操作者标识（来源 SYSTEM_INIT_ACTOR）。
    audit-actor: ${SYSTEM_INIT_ACTOR:env-operator}
    # 首次 / 强制初始化时是否走"清空重建（drop+create）"路径并要求控制台输入 true 确认。
    # 来源 SYSTEM_BOOTSTRAP_REBUILD，默认开。关闭后退回安全增量 migrate（永不 drop），
    # 用于测试 / CI / 容器等无交互或不可破坏的场景。
    interactive-rebuild: ${SYSTEM_BOOTSTRAP_REBUILD:true}

rate-limit:
  # 限流总开关
  enabled: ${RATE_LIMIT_ENABLED:true}
  # 令牌桶容量（瞬时突发上限）
  capacity: ${RATE_LIMIT_CAPACITY:30}
  # 令牌补充速率（每分钟，即持续允许的请求/分钟）
  refill-per-minute: ${RATE_LIMIT_REFILL_PER_MINUTE:60}

logging:
  level:
    root: info
  file:
    name: ./logs/app.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]){cyan} %clr(%-5level){} %clr(%logger{50}){cyan} - %clr(%msg%n){magenta}"
