server:
  port: 8080

management:
  endpoint:
    health:
      show-components: always
      show-details: always
  endpoints:
    web:
      exposure:
        # 对外暴露的 Actuator 端点列表
        include:
          # 健康检查端点
          - health
          # 指标采集端点
          - metrics
          # 应用信息端点
          - info
          # 配置刷新端点
          - refresh

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ReceptionBackendSystem
  security:
    user:
      name: admin          # 默认用户名
      password: admin123    # 默认密码
  servlet:
    multipart:
      max-file-size: 4096MB
      max-request-size: 4096MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAXIMUM_POOL_SIZE:10}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:2000}

  jpa:
    hibernate:
      ddl-auto: create  # 每次启动时重新创建表结构
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true


image:
    storage: D:\1
    base-url: http://localhost:8080/images

qweather:
  base-url: ${QWEATHER_BASE_URL}
  api-key: ${QWEATHER_API_KEY}

auth:
  # 首次启动写入 users 表的默认管理员种子账号（密码入库时会被 BCrypt 哈希）。
  # 登录校验始终以 users 表为准；生产环境请通过 AUTH_USERNAME / AUTH_PASSWORD 环境变量覆盖。
  username: ${AUTH_USERNAME:admin}
  password: ${AUTH_PASSWORD:admin123}
  # JWT 签名密钥（HS256，需 ≥32 字节）；生产环境务必通过 AUTH_JWT_SECRET 覆盖，变更后已签发令牌全部失效。
  jwt-secret: ${AUTH_JWT_SECRET:reception-backend-dev-jwt-secret-please-override-in-production}
  # 令牌有效期（分钟），默认 7 天
  jwt-expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:10080}

logging:
  level:
    root: info
    top.foxball.wsbackend: Debug
  file:
    name: ./logs/app.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]){cyan} %clr(%-5level){} %clr(%logger{50}){cyan} - %clr(%msg%n){magenta}"
