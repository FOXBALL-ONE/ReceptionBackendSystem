<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字接待系统</title>
<style>
:root {
  /* 主色：渐变红 */
  --red:        #b91c1c;
  --red-dk:     #7f1d1d;
  --red-lt:     #fef2f2;
  --red-md:     #fecaca;
  --blue-grad:  linear-gradient(135deg, #f87171 0%, #b91c1c 100%);
  --blue-grad-hd: linear-gradient(90deg, #991b1b 0%, #ef4444 100%);  /* 标题渐变：左深右浅 */
  --blue-grad-lt: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%);  /* 深红渐变（未点击图标，清晰无雾感）*/
  --blue-grad-dk: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%);
  --gold-grad:  linear-gradient(180deg, #FFF8B4 0%, #FFE780 50%, #FFDA56 100%);  /* 浅奶油黄→亮金→暖金，全程明亮 */
  --gold:       #facc15;
  --bg:     #f5f5f5;
  --white:  #ffffff;
  --bd:     #e8e8e8;
  --text:   #1a1a1a;
  --text2:  #444;
  --text3:  #777;
  --text4:  #aaa;
  --r:      12px;
  --r2:     8px;
  --sh:     0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;font-size:17px;}

/* ── INLINE SVG ICONS (替代 Font Awesome，使用 FA Free Solid 原版路径) ── */
.ic{display:inline-block;height:1em;vertical-align:-.125em;overflow:visible;}
.ic-spin{animation:ic-spin 2s linear infinite;transform-origin:center;transform-box:fill-box;}
@keyframes ic-spin{to{transform:rotate(360deg);}}

/* ── LOADING ── */
#lo{position:fixed;inset:0;z-index:999;background:var(--blue-grad-dk);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s;}
#lo.gone{opacity:0;pointer-events:none;}
.lo-icon{font-size:48px;color:rgba(255,255,255,.9);}
.lo-bar{width:160px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;}
.lo-fill{height:100%;background:#fff;animation:grow 1.2s ease forwards;}
@keyframes grow{from{width:0%}to{width:100%}}
.lo-txt{font-size:14px;color:rgba(255,255,255,.6);letter-spacing:.1em;} /* 字体放大 */

/* ── HERO ── */
/* 调整 padding-bottom，避免遮挡图片 */
.hero{position:relative;min-height:200px;max-height:400px;transition:max-height .4s ease,padding .4s ease;overflow:hidden;background:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px 24px;}



.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:1;}
.hero-content{position:relative;z-index:2;text-align:center;}
.hero-badge{font-size:15px;display:inline-block;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.9);font-size:13px;font-weight:600;letter-spacing:.16em;padding:3px 14px;border-radius:20px;margin-bottom:10px;} /* 字体放大 */
.hero-badge.hidden{display:none;}
.hero-title{font-size:30px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5);margin-bottom:4px;letter-spacing:.04em;} /* 字体放大 */
.hero-date{font-size:14px;color:rgba(255,255,255,.8);text-shadow:0 1px 4px rgba(0,0,0,.5);letter-spacing:.06em;margin-top:2px;} /* 字体放大 */
.hero-date.hidden{display:none;}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:24px;background:var(--bg);border-radius:24px 24px 0 0;}



/* ── NAV GRID ── */
.nav-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px 10px;
  background: var(--blue-grad);
  margin: -10px 14px 16px;
  position: relative;
  z-index: 10;
  border-radius: 18px;
  box-shadow: 0 6px 20px rgba(185,28,28,.25);
  padding: 16px 12px;
}
.nav-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 4px;
  cursor: pointer;
  border-radius: 12px;
  border: none;
  background: #fee2e2;
  transition: all .2s;
  -webkit-user-select: none;
  user-select: none;
  aspect-ratio: 1 / 1;
}
.nav-cell:active {
  transform: scale(.93);
}
.nav-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 6px;
  transition: all .2s;
}
.nav-icon i {
  background: var(--blue-grad-lt);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.nav-icon svg path { fill: url(#navGradLt); }
.nav-lbl {
  font-size: 15px;
  font-weight: 600;
  background: var(--blue-grad-lt);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  transition: all .2s;
}
.nav-cell.active {
  background: var(--gold-grad);
  box-shadow: 0 4px 14px rgba(250,204,21,.6);
}
.nav-cell.active .nav-icon i,
.nav-cell.active .nav-lbl {
  background: var(--blue-grad);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.nav-cell.active .nav-icon svg path { fill: url(#navGrad); }

/* ── CONTENT ── */
.content{padding:16px 14px 80px;min-height:300px;}

/* ── SCHEDULE ── */
.date-badge{display:inline-block;background:var(--blue-grad);color:#fff;font-size:16px;font-weight:700;padding:6px 20px;border-radius:20px;margin-bottom:12px;letter-spacing:.04em;box-shadow:0 2px 8px rgba(185,28,28,.3);} /* 字体放大 */
.group-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center;}
.gpill{padding:6px 18px;border-radius:20px;font-size:17px;font-weight:600;border:none;background:var(--blue-grad);color:#fff;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(185,28,28,.25);}
.gpill:active{transform:scale(.95);}
.gpill.on{background:linear-gradient(180deg, #FFF8B4 0%, #FFE780 50%, #FFDA56 100%);color:var(--red-dk);font-weight:700;box-shadow:0 3px 10px rgba(250,204,21,.6);}
.route-flow{font-size:17px;color:var(--text2);line-height:1.8;padding:12px 14px;background:linear-gradient(135deg, #fff1f2 0%, #fee2e2 100%);border-radius:var(--r2);border-left:3px solid transparent;border-image:var(--blue-grad) 1;margin-bottom:14px;box-shadow:0 2px 8px rgba(185,28,28,.1);} /* 字体放大 */
.route-node{display:inline;}
.route-arr{color:var(--red-dk);margin:0 3px;font-size:13px;}
.meeting-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.meeting-hd-line{flex:1;height:1px;background:linear-gradient(90deg, transparent 0%, #dc2626 50%, transparent 100%);}
.meeting-hd-txt{font-size:15px;font-weight:700;background:var(--blue-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;white-space:nowrap;letter-spacing:.04em;} /* 字体放大 */
.tl{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:10px;position:relative;}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:19px;top:34px;bottom:0;width:2px;background:linear-gradient(180deg, #dc2626 0%, #fecaca 100%);}
.tl-dot-wrap{flex-shrink:0;width:38px;height:38px;background:#fff;border:2.5px solid #b91c1c;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:2px;z-index:1;box-shadow:0 2px 6px rgba(185,28,28,.18);}
.tl-dot-wrap i,.tl-dot-wrap svg{font-size:16px;color:#b91c1c;}
.tl-body{flex:1;padding:6px 0 16px;}
.tl-time{font-size:18px;font-weight:700;color:var(--red);margin-bottom:2px;} /* 字体放大 */
.tl-content{font-size:20px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.45;} /* 字体放大 */
.tl-loc{font-size:16px;color:var(--text3);display:flex;align-items:center;gap:4px;} /* 字体放大 */
.no-sched{text-align:center;padding:32px 0;color:var(--text4);font-size:15px;}

/* ── SECTION HEADERS ── */

/* ── PEOPLE ── */
.filter-bar{margin-bottom:12px;}
.filter-select{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:15px;font-family:inherit;color:var(--text);background:#fff;outline:none;} /* 字体放大 */
.filter-select:focus{border-color:var(--red);}
.type-group{margin-bottom:12px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.type-hd{padding:10px 14px;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:space-between;} /* 字体放大 */
.type-hd .ct{font-size:13px;opacity:.8;}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--bd);}
.p-row:last-child{border-bottom:none;}
.p-num{width:30px;height:30px;background:var(--red-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--red);flex-shrink:0;} /* 调大 */
.p-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;} /* 调大 */
.p-info{flex:1;min-width:0;}
.p-name{font-size:16px;font-weight:700;color:var(--text);} /* 字体放大 */
.p-unit{font-size:14px;color:var(--text3);margin-top:2px;} /* 字体放大 */
.p-grp{font-size:13px;color:var(--red);margin-top:2px;} /* 字体放大 */

/* ── VEHICLE ── */
.v-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;}

/* align-items: center 是实现左侧几号车、车牌自动垂直居中的关键 */
.v-hd {
  background: var(--blue-grad-hd);
  padding: 10px 14px;
  display: flex;
  align-items: center;  /* 核心：确保左右两侧内容垂直居中对齐 */
  gap: 10px;
}
.v-no {
  background: rgba(255,255,255,.2);
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 12px;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.v-plate {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0;
  flex-shrink: 0;
}

/* 司机容器：整体靠右，内部两行文字左对齐 */
.v-driver-hd {
  margin-left: auto;         /* 核心：将整个盒子推到最右侧 */
  display: flex;
  flex-direction: column;    
  align-items: flex-start;   /* 核心：内部的姓名和电话互相左对齐 */
  justify-content: center;
  gap: 2px;
}

/* 司机姓名和电话字号都调大到 16px */
.v-driver-name {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}
.v-driver-phone {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  line-height: 1.2;
} 

/* 底部客人和工作人员样式（保持之前的左对齐和字体设定） */
.v-body{padding:12px 14px;}
.chips{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px 6px;
}
.chip {
  text-align: center;      /* 保持居中对齐 */
  font-size: 15px;
  color: var(--text2);
  padding: 4px 0;
  font-weight: 400; 
}
.v-staff-bottom {
  margin-top:14px;
  padding-top:10px;
  border-top:1px dashed var(--bd);
  font-size:15px;
  color:var(--text2);
  font-weight:400;
  text-align:left;
}

/* ── MEAL ── */
.meal-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;}
.meal-hd{background:var(--blue-grad-hd);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.meal-time{display:flex;align-items:baseline;gap:8px;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;flex-shrink:0;}
.meal-hm{font-size:22px;font-weight:800;color:#fff;line-height:1;} /* 字体放大 */
.meal-dt{font-size:13px;color:rgba(255,255,255,.85);line-height:1;} /* 字体放大；与时间同排 */
.meal-name{font-size:18px;font-weight:700;color:#fff;} /* 字体放大 */
.meal-body{padding:12px 14px;}
.meal-kv{display:flex;gap:6px;font-size:15px;padding:3px 0;} /* 字体放大 */
.meal-k{color:var(--text3);width:36px;flex-shrink:0;}
.meal-kv > span:not(.meal-k){flex:1;min-width:0;word-break:break-word;line-height:1.6;} /* 备注可换行 */

/* ── HOTEL ── */
.room-badge{background:var(--blue-grad);color:#fff;font-size:13px;font-weight:700;padding:3px 10px;border-radius:12px;margin-left:auto;flex-shrink:0;} /* 字体放大 */

/* ── SITES ── */
.site-wrap{position:relative;overflow:hidden;}
.site-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.site-nav{display:flex;gap:6px;}
.site-nav button{width:32px;height:32px;border:1.5px solid var(--bd);background:#fff;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--red);}
.site-nav button:disabled{color:var(--text4);border-color:var(--bd);}
.site-ctr{font-size:15px;color:var(--text3);} /* 字体放大 */
.site-card{background:transparent;border-radius:var(--r);box-shadow:none;overflow:hidden;}
.site-img-wrap{width:100%;height:180px;overflow:hidden;position:relative;}
.site-img-wrap img{width:100%;height:100%;object-fit:cover;}
.site-info{padding:14px;}
.site-name{font-size:22px;font-weight:800;color:var(--text);margin-bottom:40px;text-align:center;font-family:inherit;}
.site-intro{font-size:17px;color:var(--text2);line-height:1.6;font-family:inherit;}
.site-intro p:last-child,.ov-sec-body p:last-child{margin-bottom:0!important;}
.site-dots{display:flex;justify-content:center;gap:5px;padding:8px 0;border-top:1px solid var(--bd);margin-top:4px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--bd);transition:all .2s;cursor:pointer;}
.sdot.on{width:20px;border-radius:4px;background:var(--blue-grad);}

/* ── SERVICE ── */
.wx-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;}

.wx-date{font-size:14px;font-weight:700;color:var(--red);width:56px;flex-shrink:0;} /* 字体放大 */
.wx-city{font-size:14px;color:var(--text3);} /* 字体放大 */
.wx-desc{font-size:18px;font-weight:600;color:var(--text);} /* 字体放大 */
.wx-temp{font-size:18px;color:var(--red);margin-left:auto;font-weight:700;} /* 字体放大 */
.staff-grp{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;}
.staff-hd{padding:9px 14px;font-size:17px;font-weight:700;color:#fff;} /* 字体放大 */
.staff-row{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);}
.staff-row:last-child{border-bottom:none;}
.staff-name{font-size:16px;font-weight:600;flex:1;} /* 字体放大 */
.staff-role{font-size:14px;color:var(--text3);} /* 字体放大 */
.staff-tel{font-size:15px;color:var(--red);text-decoration:none;font-weight:600;} /* 字体放大 */
.notice-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;}
.notice-hd{padding:10px 14px;font-size:18px;font-weight:700;color:#fff;} /* 字体放大 */
.notice-bd{padding:12px 14px;font-size:17px;color:var(--text2);line-height:1.7;} /* 字体放大 */

/* ── OVERVIEW ── */
.ov-img{width:100%;height:160px;object-fit:cover;border-radius:var(--r);margin-bottom:12px;box-shadow:var(--sh);}
.ov-sec{margin-bottom:14px;}
.ov-sec-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:40px;text-align:center;} /* 居中黑色，字号同参会须知标题 */
.ov-sec-body{font-size:17px;color:var(--text2);line-height:1.6;} /* 字体放大 */

/* ── ERROR ── */
.err-box{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:12px;text-align:center;}
.err-icon{width:56px;height:56px;background:var(--red-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--red);}
.err-msg{font-size:14px;color:var(--red);background:var(--red-lt);padding:8px 14px;border-radius:8px;max-width:280px;word-break:break-all;line-height:1.6;}
/* ── AGENDA TABLE ── */
.agenda-tbl td{vertical-align:top;}

.retry-btn{padding:9px 22px;background:var(--blue-grad);color:#fff;border:none;border-radius:20px;font-size:15px;cursor:pointer;font-family:inherit;} /* 字体放大 */

/* ── MISC ── */
.ph{display:inline-block;width:.25em;}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:0;overflow:auto;}
#lightbox-inner{min-width:100%;min-height:100%;display:flex;align-items:center;justify-content:center;padding:16px;touch-action:pinch-zoom;}
#lightbox img{max-width:100%;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);touch-action:pinch-zoom;user-select:none;}
#lightbox-close{position:absolute;top:14px;right:16px;color:#fff;font-size:28px;cursor:pointer;line-height:1;z-index:10000;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
  <defs>
    <linearGradient id="navGradLt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
</svg>

<div id="lo">
  <div class="lo-icon"><svg viewBox="0 0 512 512" class="ic" fill="currentColor"><path d="M238.7 5.1c10.5-6.8 24.1-6.8 34.6 0l224 144c11.9 7.7 17.4 22.3 13.4 35.9s-16.5 23-30.7 23l-32 0 0 208 51.2 38.4c8.1 6 12.8 15.5 12.8 25.6 0 17.7-14.3 32-32 32L32 512c-17.7 0-32-14.3-32-32 0-10.1 4.7-19.6 12.8-25.6l51.2-38.4 0 0 0-208-32 0c-14.2 0-26.7-9.4-30.7-23s1.5-28.3 13.4-35.9l224-144zM336 208l0 208 64 0 0-208-64 0zM224 416l64 0 0-208-64 0 0 208zM112 208l0 208 64 0 0-208-64 0z"/></svg></div>
  <div class="lo-bar"><div class="lo-fill"></div></div>
  <div class="lo-txt">数 字 接 待</div>
</div>

<div class="hero" id="hero">
  <div class="hero-content" id="heroContent">
    <div class="hero-badge hidden" id="heroBadge"></div>
    <div class="hero-title" id="heroTitle"></div>
    <div class="hero-date hidden" id="heroDate"></div>
  </div>
</div>

<div class="nav-grid" id="navGrid">
  <div class="nav-cell active" data-tab="schedule" onclick="sw('schedule',this)">
    <div class="nav-icon"><svg viewBox="0 0 448 512" class="ic" fill="currentColor"><path d="M320 0c17.7 0 32 14.3 32 32l0 32 32 0c35.3 0 64 28.7 64 64l0 288c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 128C0 92.7 28.7 64 64 64l32 0 0-32c0-17.7 14.3-32 32-32s32 14.3 32 32l0 32 128 0 0-32c0-17.7 14.3-32 32-32zm22 161.7c-10.7-7.8-25.7-5.4-33.5 5.3L189.1 331.2 137 279.1c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l72 72c5 5 11.9 7.5 18.8 7s13.4-4.1 17.5-9.8L347.3 195.2c7.8-10.7 5.4-25.7-5.3-33.5z"/></svg></div>
    <div class="nav-lbl">日程</div>

<script>function currentActivityUrl() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  const sIndex = parts.indexOf('s');
  const slug = sIndex >= 0 ? parts[sIndex + 1] : '';
  if (!slug || slug === 'index-red.html') return '';
  return decodeURIComponent(slug);
}

const ACTIVITY_URL = currentActivityUrl();
const API_BASE = ACTIVITY_URL ? `/api/site/${encodeURIComponent(ACTIVITY_URL)}` : '/api';
const API = {
  meta:     () => `${API_BASE}/meta`,
  schedule: () => `${API_BASE}/schedule`,
  people:   () => `${API_BASE}/people`,
  vehicles: () => `${API_BASE}/vehicles`,
  meals:    () => `${API_BASE}/meals`,
  hotel:    () => `${API_BASE}/hotel`,
  sites:    () => `${API_BASE}/sites`,
  service:  () => `${API_BASE}/service`,
  overview: () => `${API_BASE}/overview`,
};

async function apiFetch(key) {
  const r = await fetch(API[key](), { headers:{ Accept:'application/json' }, signal: AbortSignal.timeout(15000) });
  if (!r.ok) throw new Error(`接口错误 ${r.status}`);
  return r.json();
}

const D = {}, loaded = new Set();
const TAB_KEY = { schedule:'schedule', people:'people', vehicle:'vehicles', meal:'meals', hotel:'hotel', sites:'sites', service:'service', overview:'overview' };
let cur = 'schedule', selDay = 0, selGrp = 0, selPType = null, selHType = '全部';

function safeHexColor(v, fallback = '#b91c1c') {
  const c = String(v || '').trim();
  return /^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(c) ? c : fallback;
}

// ── TAB SWITCH ──
function sw(tab, el) {
  if (tab === cur && el) return;
  cur = tab;
  document.querySelectorAll('.nav-cell').forEach(c => c.classList.toggle('active', c.dataset.tab === tab));
  swLoad(tab);
}

async function swLoad(tab) {
  if (loaded.has(tab)) { render(tab); return; }
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:48px 0;color:#bbb"><svg viewBox="0 0 512 512" class="ic ic-spin" style="font-size:32px;color:#b91c1c" fill="currentColor"><path d="M208 48a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm0 416a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zM48 208a48 48 0 1 1 0 96 48 48 0 1 1 0-96zm368 48a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zM75 369.1A48 48 0 1 1 142.9 437 48 48 0 1 1 75 369.1zM75 75A48 48 0 1 1 142.9 142.9 48 48 0 1 1 75 75zM437 369.1A48 48 0 1 1 369.1 437 48 48 0 1 1 437 369.1z"/></svg></div>';
  try {
    D[TAB_KEY[tab]] = await apiFetch(TAB_KEY[tab]);
    loaded.add(tab);
    
    if (cur !== tab) return; 
    render(tab);
  } catch(e) {
    if (cur !== tab) return; 

    document.getElementById('app').innerHTML = `
      <div class="err-box">
        <div class="err-icon"><svg viewBox="0 0 512 512" class="ic" fill="currentColor"><path d="M256 0c14.7 0 28.2 8.1 35.2 21l216 400c6.7 12.4 6.4 27.4-.8 39.5S486.1 480 472 480L40 480c-14.1 0-27.2-7.4-34.4-19.5s-7.5-27.1-.8-39.5l216-400c7-12.9 20.5-21 35.2-21zm0 352a32 32 0 1 0 0 64 32 32 0 1 0 0-64zm0-192c-18.2 0-32.7 15.5-31.4 33.7l7.4 104c.9 12.5 11.4 22.3 23.9 22.3 12.6 0 23-9.7 23.9-22.3l7.4-104c1.3-18.2-13.1-33.7-31.4-33.7z"/></svg></div>
        <div style="font-size:16px;font-weight:700">数据加载失败</div>
        <div class="err-msg">${e.message}</div>
        <button class="retry-btn" onclick="retryTab('${tab}')"><svg viewBox="0 0 512 512" class="ic" fill="currentColor"><path d="M488 192l-144 0c-9.7 0-18.5-5.8-22.2-14.8s-1.7-19.3 5.2-26.2l46.7-46.7c-75.3-58.6-184.3-53.3-253.5 15.9-75 75-75 196.5 0 271.5s196.5 75 271.5 0c8.2-8.2 15.5-16.9 21.9-26.1 10.1-14.5 30.1-18 44.6-7.9s18 30.1 7.9 44.6c-8.5 12.2-18.2 23.8-29.1 34.7-100 100-262.1 100-362 0S-25 175 75 75c94.3-94.3 243.7-99.6 344.3-16.2L471 7c6.9-6.9 17.2-8.9 26.2-5.2S512 14.3 512 24l0 144c0 13.3-10.7 24-24 24z"/></svg> 重新加载</button>
      </div>`;
  }
}

window.retryTab = t => { loaded.delete(t); swLoad(t); };

function render(tab) {
  try {
    const map = {
      schedule: rSched, people: rPeople, vehicle: rVehicle,
      meal: rMeal, hotel: rHotel, sites: rSites, service: rService, overview: rOverview,
    };
    document.getElementById('app').innerHTML = (map[tab]||(() => ''))(D[TAB_KEY[tab]]);
    if (tab === 'sites') initSiteCarousel();
    if (tab === 'overview') initOverviewCarousel();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="err-box"><div class="err-icon"><svg viewBox="0 0 576 512" class="ic" fill="currentColor"><path d="M192 96c0-53 43-96 96-96s96 43 96 96l0 3.6c0 15.7-12.7 28.4-28.4 28.4l-135.1 0c-15.7 0-28.4-12.7-28.4-28.4l0-3.6zm345.6 12.8c10.6 14.1 7.7 34.2-6.4 44.8l-97.8 73.3c5.3 8.9 9.3 18.7 11.8 29.1l98.8 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-96 0 0 32c0 2.6-.1 5.3-.2 7.9l83.4 62.5c14.1 10.6 17 30.7 6.4 44.8s-30.7 17-44.8 6.4l-63.1-47.3c-23.2 44.2-66.5 76.2-117.7 83.9L312 280c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 230.2c-51.2-7.7-94.5-39.7-117.7-83.9L83.2 473.6c-14.1 10.6-34.2 7.7-44.8-6.4s-7.7-34.2 6.4-44.8l83.4-62.5c-.1-2.6-.2-5.2-.2-7.9l0-32-96 0c-17.7 0-32-14.3-32-32s14.3-32 32-32l98.8 0c2.5-10.4 6.5-20.2 11.8-29.1L44.8 153.6c-14.1-10.6-17-30.7-6.4-44.8s30.7-17 44.8-6.4L192 184c12.3-5.1 25.8-8 40-8l112 0c14.2 0 27.7 2.8 40 8l108.8-81.6c14.1-10.6 34.2-7.7 44.8-6.4z"/></svg></div><div style="font-size:16px;font-weight:700">渲染出错</div><div class="err-msg">${e.message}</div><button class="retry-btn" onclick="retryTab('${cur}')">重试</button></div>`;
  }
}

// ── SCHEDULE ──
function rSched(data) {
  const days = data.days || [];
  if (!days.length) return '<div class="no-sched"><svg viewBox="0 0 448 512" class="ic" style="font-size:36px;margin-bottom:8px;display:block" fill="currentColor"><path d="M128 0c17.7 0 32 14.3 32 32l0 32 128 0 0-32c0-17.7 14.3-32 32-32s32 14.3 32 32l0 32 32 0c35.3 0 64 28.7 64 64l0 288c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 128C0 92.7 28.7 64 64 64l32 0 0-32c0-17.7 14.3-32 32-32zM291.9 220.1c-9.4-9.4-24.6-9.4-33.9 0l-33.9 33.9-33.9-33.9c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l33.9 33.9-33.9 33.9c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l33.9-33.9 33.9 33.9c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-33.9-33.9 33.9-33.9c9.4-9.4 9.4-24.6 0-33.9z"/></svg>暂无日程数据</div>';
  const day = days[selDay] || days[0];
  const groups = day.groups || [];
  const grp = groups[selGrp] || groups[0] || {};
  const meetings = (grp.meetings && grp.meetings.length) ? grp.meetings : (day.meetings || []);

  return `
    <div style="margin-bottom:14px;display:flex;justify-content:center">
      ${days.length > 1 ? days.map((d,i) => `
        <span onclick="pickDay(${i})" style="margin:0 4px;padding:6px 18px;border-radius:20px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;border:none;
          ${i===selDay ? 'background:linear-gradient(180deg, #FFF8B4 0%, #FFE780 50%, #FFDA56 100%);color:var(--red-dk);box-shadow:0 3px 10px rgba(250,204,21,.6)' : 'background:var(--blue-grad);color:#fff;box-shadow:0 2px 8px rgba(185,28,28,.25)'}">${d.date}</span>
      `).join('') : `<span class="date-badge">${day.date}</span>`}
    </div>
    ${groups.length > 1 ? `<div class="group-pills">${groups.map((g,i) => `<span class="gpill${i===selGrp?' on':''}" onclick="pickGrp(${i})">${g.name}</span>`).join('')}</div>` : ''}
    ${grp.mapImage ? `
    <div id="mapWrap" style="margin:12px 0;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);background:var(--bd);min-height:60px;position:relative" onclick="openLightbox('${grp.mapImage}')">
      <div id="mapSkel" style="position:absolute;inset:0;background:linear-gradient(90deg,var(--bd) 25%,#e8e8e8 50%,var(--bd) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite"></div>
      <img src="${grp.mapImage}" style="width:100%;display:block;position:relative;cursor:zoom-in" alt="路线图"
        onload="this.previousElementSibling.style.display='none'"
        onerror="this.parentElement.style.display='none'">
    </div>` : ''}
    ${grp.route && grp.route.length ? `
      <div class="route-flow">
        ${grp.route.map((s,i) => `<span class="route-node">${i>0?'<span class="route-arr">▶</span>':''}${s}</span>`).join('')}
      </div>` : ''}
    ${grp.agendaTable && grp.agendaTable.rows && grp.agendaTable.rows.length ? `
      <table class="agenda-tbl" style="width:100%;table-layout:fixed;border-collapse:collapse;margin-top:8px;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);font-size:15px;line-height:1.6">
        <tbody>
          ${grp.agendaTable.rows.map((r, idx, arr) => {
            const isLast = idx === arr.length - 1;
            const esc = t => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const escNl = t => esc(t).replace(/\n/g,'<br>');
            if (r.type === 'full') {
              const isTitle = idx === 0;
              const align = isLast ? 'left' : 'center';
              return `<tr><td colspan="2" style="padding:${isTitle?'12px 14px':'8px 14px'};text-align:${align};${isTitle?'background:var(--blue-grad-hd);color:#fff;font-size:22px;font-weight:800':'background:#fff1f2;color:var(--text);font-size:17px;font-weight:600'};border-bottom:1px solid var(--bd);white-space:normal;word-break:break-word;line-height:1.6">${escNl(r.text)}</td></tr>`;
            }
            if (r.type === 'tc') {
              return `<tr style="border-bottom:1px solid var(--bd)">
                <td style="padding:10px 12px;color:var(--red);font-weight:700;font-size:17px;white-space:normal;word-break:break-word;vertical-align:middle;text-align:center;border-right:1px solid var(--bd);width:50%">${escNl(r.time)}</td>
                <td style="padding:10px 12px;color:var(--text2);white-space:normal;word-break:break-word;font-size:17px;vertical-align:middle;text-align:center;width:50%">${escNl(r.content)}</td>
              </tr>`;
            }
            // 'row' fallback: multi-cell generic row
            return `<tr style="border-bottom:1px solid var(--bd);${isLast ? 'text-align:left;' : ''}"><td colspan="2" style="padding:8px 12px;white-space:normal;word-break:break-word">${r.cells.map(escNl).join(' | ')}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    ` : meetings.length ? `
      <div class="meeting-hd">
        <div class="meeting-hd-line"></div>
        <div class="meeting-hd-txt">会议日程</div>
        <div class="meeting-hd-line"></div>
      </div>
      <div class="tl">

    typeGrp[p.type].push(p);

// ── MEAL ──
function rMeal(data) {
  const meals = data || [];
  if (!meals.length) return '<div style="text-align:center;padding:32px 0;color:var(--text4);font-size:15px">暂无用餐安排</div>';

  const byDay = {};
  const dayOrder = [];
  meals.forEach(m => {
    const dt = m.time ? new Date(m.time) : null;
    const key = (dt && !isNaN(dt))
      ? `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`
      : '_nodate';
    if (!byDay[key]) { byDay[key] = []; dayOrder.push(key); }
    byDay[key].push({ ...m, _dt: dt });
  });

  const esc = t => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  return `
    ${dayOrder.map(key => {
      const dayMeals = byDay[key];
      const remarks = dayMeals.map(m => (m.remark||'').trim()).filter(Boolean);
      return `
        <div class="meal-card">
          <div class="meal-hd" style="padding:12px 12px;gap:8px;flex-wrap:wrap;align-items:stretch;justify-content:center">
            ${dayMeals.map(m => {
              const dt = m._dt;
              const hm = (dt && !isNaN(dt)) ? `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}` : '';
              return `<span style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 14px;border-radius:10px;min-width:88px;background:#fff;color:var(--red-dk);box-shadow:0 2px 6px rgba(0,0,0,.18)">
                ${hm ? `<span style="font-size:20px;font-weight:800;line-height:1.1">${hm}</span>` : ''}
                <span style="font-size:16px;font-weight:600;line-height:1.2">${esc(m.label||'用餐')}</span>
              </span>`;
            }).join('')}
          </div>
          ${remarks.length ? `<div class="meal-body" style="white-space:pre-wrap;word-break:break-word;font-size:15px;color:var(--text2);line-height:1.7">${remarks.map(esc).join('\n')}</div>` : ''}
        </div>`;
    }).join('')}`;
}

      ${sites.map((s,i) => `
        <div class="site-card" style="flex:0 0 100%;scroll-snap-align:start;scroll-snap-stop:always;border-radius:0;box-shadow:none;padding:0 2px;box-sizing:border-box;">
          ${s.images?.length ? `<img class="ov-img" src="${s.images[0]}" alt="${s.name}" onerror="this.style.display='none'">` : ''}
          <div class="site-info" style="padding:0;">
            <div class="site-name" style="text-align:center">${s.name||''}</div>
            <div class="site-intro">${(s.intro||'').split(/\n+/).map(p=>p.trim()).filter(Boolean).map(p=>`<p style="text-indent:2em;margin:0 0 8px">${p}</p>`).join('') || `<p style="text-indent:2em;margin:0">${s.intro||''}</p>`}</div>
          </div>
        </div>`).join('')}
    </div>
    ${n > 1 ? `<div class="site-dots" style="margin-top:10px">${sites.map((_,i)=>`<div class="sdot${i===0?' on':''}" id="sdot${i}" onclick="scrollSite(${i})"></div>`).join('')}</div>` : ''}`;
}

function initSiteCarousel() {
  const c = document.getElementById('site-carousel');
  if (!c) return;
  const n = (D.sites || []).length;
  c.addEventListener('scroll', () => {
    const i = Math.round(c.scrollLeft / c.offsetWidth);
    if (i !== _siteCur) {
      _siteCur = i;
      const ctr = document.getElementById('siteCtr'); if (ctr) ctr.textContent = (i+1)+' / '+n;
      document.querySelectorAll('.sdot').forEach((d,j) => d.classList.toggle('on', j===i));
    }
  }, {passive:true});
}
window.scrollSite = i => {
  const c = document.getElementById('site-carousel');
  if (c) c.scrollTo({left: i * c.offsetWidth, behavior:'smooth'});
};

// ── SERVICE ──
function rService(data) {
  const svc = data || {};
  const staff   = svc.staff   || [];
  const weather = svc.weather || [];
  const notices = svc.notices || [];
  const isNoticeMode = D.serviceMode === 1;
  const attendNotice = D.attendNotice || '';

  const sections = [];
  const esc = t => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const telHref = t => String(t || '').replace(/[^\d+]/g, '');
  const roomOf = m => {
    const room = String(m.room || '').trim().replace(/^房号\s*/, '');
    if (room) return room;
    const dutyMatch = String(m.duty || '').match(/房号\s*([0-9A-Za-z\u4e00-\u9fa5-]+)/);
    if (dutyMatch) return dutyMatch[1];
    const nameMatch = String(m.name || '').match(/\s*房号\s*([0-9A-Za-z\u4e00-\u9fa5-]+)\s*$/);
    return nameMatch ? nameMatch[1] : '';
  };
  const contactNameOf = m => String(m.name || '').replace(/\s*房号\s*[0-9A-Za-z\u4e00-\u9fa5-]+\s*$/, '').trim();
  const contactRows = staff.flatMap(g => (g.members || [])
    .filter(m => m && (m.name || m.phone || m.duty || m.room))
    .map((m, i) => ({
      unit: i === 0 ? (g.type || '') : '',
      name: contactNameOf(m),
      phone: m.phone || '',
      room: roomOf(m),
    })));

  if (isNoticeMode) {
    if (attendNotice.trim()) {
      const title = D.attendNoticeTitle || '参会须知';
      sections.push(`
        <div style="text-align:center;font-size:22px;font-weight:800;color:var(--text);margin-bottom:40px">${esc(title)}</div>
        <div style="text-indent:2em;font-size:17px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word;font-family:inherit">${esc(attendNotice)}</div>`);
    }
    return sections.join('<br style="border:none;border-top:1px solid var(--bd);margin:14px 0">');
  }

  // 温馨提示
  if (notices.length) {
    sections.push(`
      <div style="background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden">
        <div style="background:var(--blue-grad-hd);padding:10px 14px;font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px">
          <svg viewBox="0 0 512 512" class="ic" style="font-size:16px" fill="currentColor"><path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM216 336h24V272H216c-13.3 0-24-10.7-24-24s10.7-24 24-24h48c13.3 0 24 10.7 24 24v88h8c13.3 0 24 10.7 24 24s-10.7 24-24 24H216c-13.3 0-24-10.7-24-24s10.7-24 24-24zm40-208a32 32 0 1 1 0 64 32 32 0 1 1 0-64z"/></svg>
          温馨提示
        </div>
        <div style="padding:14px">
          ${notices.map((n, i) => `
            <div style="${i > 0 ? 'margin-top:14px;padding-top:14px;border-top:1px dashed var(--bd);' : ''}">
              ${n.title ? `<div style="font-size:16px;font-weight:700;color:var(--red-dk);margin-bottom:6px">${esc(n.title)}</div>` : ''}
              <div style="font-size:16px;color:var(--text2);line-height:1.75;white-space:pre-wrap;word-break:break-word;font-family:inherit">${esc(n.content||'')}</div>
            </div>`).join('')}
        </div>
      </div>`);
  }
  // 工作人员：使用表格样式展示
  if (contactRows.length) {
    sections.push(`
      <div style="background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden">
        <div style="background:var(--blue-grad-hd);padding:10px 14px;font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px">
          <svg viewBox="0 0 512 512" class="ic" style="font-size:16px" fill="currentColor"><path d="M164.9 24.6c-7.7-18.6-28-28.5-47.4-23.2l-88 24C12.1 30.2 0 46 0 64C0 311.4 200.6 512 448 512c18 0 33.8-12.1 38.6-29.5l24-88c5.3-19.4-4.6-39.7-23.2-47.4l-96-40c-16.3-6.8-35.2-2.1-46.3 11.6L304.7 368C234.3 334.7 177.3 277.7 144 207.3L193.3 167c13.7-11.2 18.4-30 11.6-46.3l-40-96z"/></svg>
          工作人员联系方式
        </div>
        <table style="width:100%;border-collapse:collapse;table-layout:fixed;font-size:16px">
          <thead>
            <tr style="background:#fff1f2">
              <th style="padding:10px 8px;border-bottom:2px solid var(--red-md);width:30%;color:var(--red-dk);font-weight:700;text-align:center">单位</th>
              <th style="padding:10px 8px;border-bottom:2px solid var(--red-md);width:30%;color:var(--red-dk);font-weight:700;text-align:center">联系人</th>
              <th style="padding:10px 8px;border-bottom:2px solid var(--red-md);width:40%;color:var(--red-dk);font-weight:700;text-align:center">电话号码</th>
            </tr>
          </thead>
          <tbody>
            ${contactRows.map((row, idx) => `
              <tr style="${idx < contactRows.length - 1 ? 'border-bottom:1px solid var(--bd)' : ''}">
                <td style="padding:10px 8px;text-align:center">${esc(row.unit)}</td>
                <td style="padding:10px 8px;text-align:center;word-break:break-word">${esc(row.name)}</td>
                <td style="padding:10px 8px;text-align:center;word-break:break-word">
                  ${row.phone ? `<a href="tel:${telHref(row.phone)}" style="color:var(--red);text-decoration:none;font-weight:600">${esc(row.phone)}</a>` : ''}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `);
  }

  // if (weather.length) {
  //   sections.push(`
  //     <div style="background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden">
  //       ${weather.map(w=>`<div class="wx-row" style="border-bottom:none">
  //         <div style="flex-shrink:0"><div class="wx-date">${w.date||''}</div><div class="wx-city">${w.city||''}</div></div>
  //         <div class="wx-desc" style="flex:1;text-align:center">${w.desc||w.description||''}</div>
  //         <div class="wx-temp" style="flex-shrink:0">${w.temp||''}</div>
  //       </div>`).join('')}
  //     </div>`);
  // }

  return '' +
         sections.join('<br style="border:none;border-top:1px solid var(--bd);margin:14px 0">');
}

      </div>
      <div class="site-dots" style="margin-top:10px">${secs.map((_,i)=>`<div class="sdot${i===0?' on':''}" id="odot${i}" onclick="scrollOv(${i})"></div>`).join('')}</div>
    ` : secs.map(s => `<div class="ov-sec">${slideBody(s)}</div>`).join('')}`;
}
function initOverviewCarousel() {
  const c = document.getElementById('ov-carousel');
  if (!c) return;
  _ovCur = 0;
  const n = ((D.overview && D.overview.sections) || []).length;
  c.addEventListener('scroll', () => {
    const i = Math.round(c.scrollLeft / c.offsetWidth);
    if (i !== _ovCur) {
      _ovCur = i;
      const ctr = document.getElementById('ovCtr'); if (ctr) ctr.textContent = (i+1)+' / '+n;
      for (let j=0; j<n; j++) {
        const d = document.getElementById('odot'+j);
        if (d) d.classList.toggle('on', j===i);
      }
    }
  }, {passive:true});
}
window.scrollOv = i => {
  const c = document.getElementById('ov-carousel');
  if (c) c.scrollTo({left: i * c.offsetWidth, behavior:'smooth'});
};


window.filterP = q => { 
  const r = q.replace(/\s+/g, '').toLowerCase(); 
  document.querySelectorAll('.p-row').forEach(row => {
    const t = (row.querySelector('.p-name')?.textContent || '').replace(/\s+/g, '').toLowerCase(); 
    row.style.display = (!r || t.includes(r)) ? '' : 'none';
  }); 
};

window.filterV = q => { 
  const r = q.replace(/\s+/g, '').toLowerCase(); 
  document.querySelectorAll('.v-card').forEach(c => {
    const t = c.textContent.replace(/\s+/g, '').toLowerCase();
    c.style.display = (!r || t.includes(r)) ? '' : 'none';
  }); 
};

window.filterH = q => { 
  const r = q.replace(/\s+/g, '').toLowerCase(); 
  document.querySelectorAll('.p-row').forEach(row => {
    if(row.closest('.type-group')){
      const name = (row.querySelector('.p-name')?.textContent || '').toLowerCase();
      const unit = (row.querySelector('.p-unit')?.textContent || '').toLowerCase();
      const room = (row.querySelector('.room-hd')?.textContent || '').toLowerCase();
      const t = (name + '|' + unit + '|' + room).replace(/\s+/g, ''); 
      row.style.display = (!r || t.includes(r)) ? '' : 'none';
    }
  }); 
};

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  const loEl = document.getElementById('lo');

  try {
    const meta = await apiFetch('meta');
    Object.assign(D, meta);

    if (meta.access === false) {
      loEl.style.display = 'none';
      document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;gap:16px;padding:32px;text-align:center">
        <div style="width:64px;height:64px;background:#fff1f1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px">🔒</div>
        <div style="font-size:20px;font-weight:700">${meta.closedTitle||'系统暂停访问'}</div>
        <div style="font-size:15px;color:#777;max-width:280px;line-height:1.7">${meta.closedMessage||'当前页面已关闭，请联系工作人员。'}</div>
      </div>`;
      return;
    }

    if (meta.eventName) document.getElementById('heroTitle').textContent = "";//meta.eventName;
    document.title = meta.eventName || meta.headerTitle || '数字接待系统';
    D.showMeetingLocation = meta.showMeetingLocation !== false; // default true
    D.serviceMode = meta.serviceMode === 1 ? 1 : 0;
    D.attendNotice = meta.attendNotice || '';
    D.attendNoticeTitle = meta.attendNoticeTitle || '参会须知';
    if (meta.icpNumber || meta.techSupport) {
      const f = document.getElementById('icpFooter');
      if (f) {
        const parts = [];
        if (meta.icpNumber) parts.push(`<a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${meta.icpNumber}</a>`);
        if (meta.techSupport) parts.push(`<span>${meta.techSupport}</span>`);
        f.innerHTML = parts.join('<span style="margin:0 8px;color:#ccc">|</span>');
        f.style.display = 'block';
      }
    }
    if (meta.heroLabel) { const el = document.getElementById('heroBadge'); el.textContent = meta.heroLabel; el.classList.remove('hidden'); }
    if (meta.dateRange) { const el = document.getElementById('heroDate'); el.textContent = meta.dateRange; el.classList.remove('hidden'); }
    if (meta.bannerImage) {
      const img = document.createElement('img');
      img.src = meta.bannerImage; img.className = 'hero-img';
      img.onload = function() {
        const hero = document.getElementById('hero');
        hero.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
        hero.style.minHeight = 'unset'; 
      };
      img.onerror = () => img.remove();
      document.getElementById('hero').insertBefore(img, document.getElementById('hero').firstChild);
    }
  } catch(e) {
    console.warn('meta fetch failed:', e.message);
  }

  if (D.showLoading === false) loEl.style.display = 'none';
  else setTimeout(() => loEl.classList.add('gone'), 1400);

  await swLoad('schedule');
});
</script>

<div id="lightbox" style="display:none" onclick="if(event.target===this||event.target.id==='lightbox-close')closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <div id="lightbox-inner">
    <img id="lightbox-img" src="" alt="路线图" onclick="event.stopPropagation()">
  </div>
</div>
<script>
let _lbScale = 1, _lbTx = 0, _lbTy = 0;
let _lbInitScale = 1, _lbInitTx = 0, _lbInitTy = 0;
let _lbInitDist = 0, _lbInitCx = 0, _lbInitCy = 0;
let _lbLastX = 0, _lbLastY = 0, _lbDragging = false;

function applyLbTransform() {
  const img = document.getElementById('lightbox-img');
  if (img) img.style.transform = `translate(${_lbTx}px,${_lbTy}px) scale(${_lbScale})`;
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  _lbScale = 1; _lbTx = 0; _lbTy = 0;
  applyLbTransform();
  document.getElementById('lightbox').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}

function _lbViewportCenter() {
  const vp = document.getElementById('lightbox');
  const rect = vp.getBoundingClientRect();
  return { cx: rect.left + rect.width/2, cy: rect.top + rect.height/2 };
}

document.addEventListener('DOMContentLoaded', () => {
  const img = document.getElementById('lightbox-img');
  if (!img) return;

  img.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      _lbInitScale = _lbScale;
      _lbInitTx = _lbTx;
      _lbInitTy = _lbTy;
      _lbInitDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      _lbInitCx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      _lbInitCy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    } else if (e.touches.length === 1 && _lbScale > 1) {
      _lbLastX = e.touches[0].clientX;
      _lbLastY = e.touches[0].clientY;
      _lbDragging = true;
    }
  }, {passive:true});

  img.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const currDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const currCx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const currCy = (e.touches[0].clientY + e.touches[1].clientY) / 2;

      const rawScale = _lbInitScale * (currDist / _lbInitDist);
      const newScale = Math.max(1, Math.min(5, rawScale));
      const ratio = newScale / _lbInitScale;

      const { cx, cy } = _lbViewportCenter();
      const fx = _lbInitCx - cx;
      const fy = _lbInitCy - cy;
      const dx = currCx - _lbInitCx;
      const dy = currCy - _lbInitCy;

      _lbTx = dx + fx * (1 - ratio) + _lbInitTx * ratio;
      _lbTy = dy + fy * (1 - ratio) + _lbInitTy * ratio;
      _lbScale = newScale;
      applyLbTransform();
    } else if (e.touches.length === 1 && _lbDragging && _lbScale > 1) {
      e.preventDefault();
      _lbTx += e.touches[0].clientX - _lbLastX;
      _lbTy += e.touches[0].clientY - _lbLastY;
      _lbLastX = e.touches[0].clientX;
      _lbLastY = e.touches[0].clientY;
      applyLbTransform();
    }
  }, {passive:false});

  img.addEventListener('touchend', e => {
    if (e.touches.length === 0) {
      _lbDragging = false;
      if (_lbScale <= 1.05) {
        _lbScale = 1; _lbTx = 0; _lbTy = 0;
        applyLbTransform();
      }
    }
  });

  img.addEventListener('dblclick', () => {
    _lbScale = _lbScale === 1 ? 2.5 : 1;
    _lbTx = 0; _lbTy = 0;
    applyLbTransform();
  });
});
</script>
