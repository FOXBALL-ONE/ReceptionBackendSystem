<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片管理</title>
    <style>
        :root {
            --bg: #f6f7f4;
            --surface: #ffffff;
            --surface-strong: #f1f4ee;
            --line: #d9ded3;
            --text: #1f2a24;
            --muted: #657064;
            --accent: #12715f;
            --accent-strong: #0d5a4c;
            --warn: #b45309;
            --danger: #b42318;
            --danger-bg: #fff1f0;
            --shadow: 0 16px 38px rgba(31, 42, 36, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            min-height: 38px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 0 14px;
            color: #ffffff;
            background: var(--accent);
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
            white-space: nowrap;
        }

        button:hover {
            background: var(--accent-strong);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
        }

        button.secondary {
            background: #ffffff;
            color: var(--text);
            border-color: var(--line);
        }

        button.secondary:hover {
            background: var(--surface-strong);
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: #8f1d14;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #ffffff;
            color: var(--text);
            padding: 8px 10px;
        }

        input:focus {
            outline: 2px solid rgba(18, 113, 95, 0.18);
            border-color: var(--accent);
        }

        .page {
            width: min(1440px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 22px 0 28px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status {
            min-height: 24px;
            color: var(--muted);
            font-size: 14px;
            text-align: right;
        }

        .status.error {
            color: var(--danger);
        }

        .status.success {
            color: var(--accent);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(270px, 330px) minmax(0, 1fr) minmax(310px, 380px);
            gap: 16px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: var(--surface-strong);
            border-radius: 8px 8px 0 0;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 16px;
            line-height: 1.3;
            letter-spacing: 0;
        }

        .panel-body {
            padding: 16px;
        }

        .form-row {
            display: grid;
            gap: 7px;
            margin-bottom: 14px;
        }

        .form-row label {
            font-size: 13px;
            color: var(--muted);
        }

        .upload-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 18px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 10px;
            background: #fbfcfa;
        }

        .stat span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat strong {
            display: block;
            font-size: 18px;
            line-height: 1.2;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar input {
            min-width: 210px;
        }

        .table-wrap {
            min-height: 540px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #eef3ef;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--line);
        }

        tbody td {
            padding: 10px;
            border-bottom: 1px solid #edf0ea;
            vertical-align: middle;
            font-size: 13px;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr:hover {
            background: #fafbf8;
        }

        tbody tr.active {
            background: #e9f4f0;
        }

        .thumb-cell {
            width: 74px;
        }

        .thumb {
            width: 56px;
            height: 56px;
            object-fit: cover;
            display: block;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: var(--surface-strong);
        }

        .file-name {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        .file-sub {
            display: block;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted);
            font-size: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            max-width: 100%;
            min-height: 24px;
            border-radius: 999px;
            padding: 0 9px;
            color: var(--warn);
            background: #fff8ed;
            border: 1px solid #f4d19c;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .row-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .row-actions button {
            min-height: 32px;
            padding: 0 10px;
            font-size: 12px;
        }

        .detail-preview {
            width: 100%;
            aspect-ratio: 4 / 3;
            border: 1px solid var(--line);
            border-radius: 7px;
            object-fit: contain;
            background: #f8faf6;
            display: block;
        }

        .detail-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 14px 0;
        }

        .detail-actions .danger {
            grid-column: 1 / -1;
        }

        .meta-list {
            display: grid;
            gap: 9px;
            margin: 0;
        }

        .meta-item {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #edf0ea;
            font-size: 13px;
        }

        .meta-item dt {
            color: var(--muted);
        }

        .meta-item dd {
            margin: 0;
            overflow-wrap: anywhere;
        }

        .empty {
            min-height: 280px;
            display: grid;
            place-items: center;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            padding: 24px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1180px) {
            .layout {
                grid-template-columns: 310px minmax(0, 1fr);
            }

            .detail-panel {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 760px) {
            .page {
                width: min(100vw - 20px, 720px);
                padding-top: 14px;
            }

            .topbar,
            .toolbar,
            .layout {
                display: grid;
                grid-template-columns: 1fr;
            }

            .status {
                text-align: left;
            }

            .panel-header {
                align-items: stretch;
                display: grid;
            }

            .toolbar input {
                min-width: 0;
            }

            .table-wrap {
                min-height: 420px;
            }

            thead .optional,
            tbody .optional {
                display: none;
            }

            .row-actions {
                display: grid;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <header class="topbar">
        <div class="title-block">
            <h1>图片管理</h1>
        </div>
        <div id="status" class="status"></div>
    </header>

    <section class="layout">
        <aside class="panel">
            <div class="panel-header">
                <h2>上传</h2>
            </div>
            <div class="panel-body">
                <form id="uploadForm">
                    <div class="form-row">
                        <label for="imageFile">图片文件</label>
                        <input id="imageFile" name="file" type="file" accept="image/*" required>
                    </div>
                    <div class="form-row">
                        <label for="activityId">活动ID</label>
                        <input id="activityId" name="activityId" type="number" min="1" step="1" required>
                    </div>
                    <div class="form-row">
                        <label for="usageType">用途</label>
                        <input id="usageType" name="usageType" type="text" autocomplete="off">
                    </div>
                    <div class="form-row">
                        <label for="uploadedBy">上传人</label>
                        <input id="uploadedBy" name="uploadedBy" type="text" autocomplete="off">
                    </div>
                    <div class="upload-actions">
                        <button id="uploadButton" type="submit">上传图片</button>
                    </div>
                </form>

                <div class="stats" aria-live="polite">
                    <div class="stat">
                        <span>图片数量</span>
                        <strong id="totalCount">0</strong>
                    </div>
                    <div class="stat">
                        <span>文件大小</span>
                        <strong id="totalSize">0 B</strong>
                    </div>
                </div>
            </div>
        </aside>

        <section class="panel">
            <div class="panel-header">
                <h2>列表</h2>
                <div class="toolbar">
                    <input id="searchInput" type="text" placeholder="搜索文件名、用途、上传人">
                    <button id="refreshButton" class="secondary" type="button">刷新</button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th class="thumb-cell">预览</th>
                        <th>文件</th>
                        <th class="optional" style="width: 120px;">用途</th>
                        <th class="optional" style="width: 118px;">大小</th>
                        <th style="width: 142px; text-align: right;">操作</th>
                    </tr>
                    </thead>
                    <tbody id="imageTableBody"></tbody>
                </table>
                <div id="emptyList" class="empty hidden">暂无图片</div>
            </div>
        </section>

        <aside class="panel detail-panel">
            <div class="panel-header">
                <h2>详情</h2>
            </div>
            <div id="detailEmpty" class="empty">未选择图片</div>
            <div id="detailBody" class="panel-body hidden">
                <img id="detailPreview" class="detail-preview" alt="图片预览">
                <div class="detail-actions">
                    <button id="detailDownloadButton" type="button">下载</button>
                    <button id="detailOpenButton" class="secondary" type="button">查看原图</button>
                    <button id="detailDeleteButton" class="danger" type="button">删除图片</button>
                </div>
                <dl id="detailMeta" class="meta-list"></dl>
            </div>
        </aside>
    </section>
</main>

<script>
(() => {
    const endpoints = {
        list: "/api/images/list",
        detail: "/api/images/find-by-id",
        upload: "/api/images/upload",
        download: "/api/images/download",
        remove: "/api/images/delete"
    };

    const state = {
        images: [],
        selectedId: null,
        selectedImage: null,
        busy: false
    };

    const el = {
        status: document.getElementById("status"),
        uploadForm: document.getElementById("uploadForm"),
        imageFile: document.getElementById("imageFile"),
        activityId: document.getElementById("activityId"),
        usageType: document.getElementById("usageType"),
        uploadedBy: document.getElementById("uploadedBy"),
        uploadButton: document.getElementById("uploadButton"),
        totalCount: document.getElementById("totalCount"),
        totalSize: document.getElementById("totalSize"),
        searchInput: document.getElementById("searchInput"),
        refreshButton: document.getElementById("refreshButton"),
        imageTableBody: document.getElementById("imageTableBody"),
        emptyList: document.getElementById("emptyList"),
        detailEmpty: document.getElementById("detailEmpty"),
        detailBody: document.getElementById("detailBody"),
        detailPreview: document.getElementById("detailPreview"),
        detailDownloadButton: document.getElementById("detailDownloadButton"),
        detailOpenButton: document.getElementById("detailOpenButton"),
        detailDeleteButton: document.getElementById("detailDeleteButton"),
        detailMeta: document.getElementById("detailMeta")
    };

    const setStatus = (message, type = "") => {
        el.status.textContent = message || "";
        el.status.className = `status ${type}`.trim();
    };

    const setBusy = (busy) => {
        state.busy = busy;
        el.uploadButton.disabled = busy;
        el.refreshButton.disabled = busy;
        el.detailDownloadButton.disabled = busy || !state.selectedId;
        el.detailDeleteButton.disabled = busy || !state.selectedId;
        el.detailOpenButton.disabled = busy || !state.selectedImage?.accessUrl;
    };

    const postJson = async (url, body) => {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body || {})
        });
        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload || payload.status >= 400) {
            throw new Error(payload?.message || `请求失败：${response.status}`);
        }
        return payload.data;
    };

    const formatBytes = (value) => {
        const size = Number(value || 0);
        if (size < 1024) return `${size} B`;
        const units = ["KB", "MB", "GB", "TB"];
        let current = size / 1024;
        let index = 0;
        while (current >= 1024 && index < units.length - 1) {
            current /= 1024;
            index += 1;
        }
        return `${current.toFixed(current >= 10 ? 1 : 2)} ${units[index]}`;
    };

    const formatDate = (value) => {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString("zh-CN", { hour12: false });
    };

    const displayValue = (value) => {
        if (value === null || value === undefined || value === "") return "-";
        return String(value);
    };

    const filteredImages = () => {
        const keyword = el.searchInput.value.trim().toLowerCase();
        if (!keyword) return state.images;
        return state.images.filter((image) => {
            return [
                image.originalFilename,
                image.storedFilename,
                image.usageType,
                image.uploadedBy,
                image.objectKey,
                image.sha256
            ].some((value) => String(value || "").toLowerCase().includes(keyword));
        });
    };

    const renderStats = () => {
        el.totalCount.textContent = String(state.images.length);
        const totalSize = state.images.reduce((sum, image) => sum + Number(image.fileSize || 0), 0);
        el.totalSize.textContent = formatBytes(totalSize);
    };

    const createCell = (text, className = "") => {
        const td = document.createElement("td");
        if (className) td.className = className;
        td.textContent = text;
        return td;
    };

    const createButton = (text, className, onClick) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = text;
        if (className) button.className = className;
        button.addEventListener("click", (event) => {
            event.stopPropagation();
            onClick();
        });
        return button;
    };

    const renderList = () => {
        el.imageTableBody.replaceChildren();
        const images = filteredImages();
        el.emptyList.classList.toggle("hidden", images.length > 0);

        images.forEach((image) => {
            const row = document.createElement("tr");
            if (image.id === state.selectedId) row.classList.add("active");
            row.addEventListener("click", () => selectImage(image.id));

            const thumbCell = document.createElement("td");
            thumbCell.className = "thumb-cell";
            const thumb = document.createElement("img");
            thumb.className = "thumb";
            thumb.alt = image.originalFilename || "图片";
            thumb.src = image.accessUrl || "";
            thumb.loading = "lazy";
            thumbCell.appendChild(thumb);

            const fileCell = document.createElement("td");
            const fileName = document.createElement("span");
            fileName.className = "file-name";
            fileName.textContent = image.originalFilename || image.storedFilename || "-";
            const fileSub = document.createElement("span");
            fileSub.className = "file-sub";
            fileSub.textContent = image.objectKey || "-";
            fileCell.append(fileName, fileSub);

            const usageCell = document.createElement("td");
            usageCell.className = "optional";
            const usage = document.createElement("span");
            usage.className = "pill";
            usage.textContent = image.usageType || "未分类";
            usageCell.appendChild(usage);

            const actionCell = document.createElement("td");
            const actions = document.createElement("div");
            actions.className = "row-actions";
            actions.append(
                createButton("详情", "secondary", () => selectImage(image.id)),
                createButton("下载", "", () => downloadImage(image.id))
            );
            actionCell.appendChild(actions);

            row.append(
                thumbCell,
                fileCell,
                usageCell,
                createCell(formatBytes(image.fileSize), "optional"),
                actionCell
            );
            el.imageTableBody.appendChild(row);
        });
    };

    const renderDetail = (image) => {
        state.selectedImage = image || null;
        el.detailEmpty.classList.toggle("hidden", Boolean(image));
        el.detailBody.classList.toggle("hidden", !image);

        if (!image) {
            el.detailPreview.removeAttribute("src");
            el.detailMeta.replaceChildren();
            setBusy(state.busy);
            return;
        }

        el.detailPreview.src = image.accessUrl || "";
        el.detailPreview.alt = image.originalFilename || "图片预览";
        const items = [
            ["ID", image.id],
            ["原始文件名", image.originalFilename],
            ["存储文件名", image.storedFilename],
            ["用途", image.usageType],
            ["上传人", image.uploadedBy],
            ["类型", image.contentType],
            ["大小", formatBytes(image.fileSize)],
            ["尺寸", image.width && image.height ? `${image.width} x ${image.height}` : "-"],
            ["SHA-256", image.sha256],
            ["对象路径", image.objectKey],
            ["创建时间", formatDate(image.createdAt)],
            ["更新时间", formatDate(image.updatedAt)]
        ];

        el.detailMeta.replaceChildren();
        items.forEach(([label, value]) => {
            const item = document.createElement("div");
            item.className = "meta-item";
            const dt = document.createElement("dt");
            dt.textContent = label;
            const dd = document.createElement("dd");
            dd.textContent = displayValue(value);
            item.append(dt, dd);
            el.detailMeta.appendChild(item);
        });
        setBusy(state.busy);
    };

    const loadImages = async () => {
        setBusy(true);
        setStatus("加载中...");
        try {
            const data = await postJson(endpoints.list, {});
            state.images = Array.isArray(data) ? data : [];
            renderStats();
            renderList();

            if (state.selectedId && state.images.some((image) => image.id === state.selectedId)) {
                await selectImage(state.selectedId, false);
            } else if (state.images.length > 0) {
                await selectImage(state.images[0].id, false);
            } else {
                state.selectedId = null;
                renderDetail(null);
            }
            setStatus("已刷新", "success");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setBusy(false);
        }
    };

    const selectImage = async (id, showStatus = true) => {
        if (!id) return;
        state.selectedId = id;
        renderList();
        setBusy(true);
        if (showStatus) setStatus("加载详情...");
        try {
            const detail = await postJson(endpoints.detail, { id });
            renderDetail(detail);
            if (showStatus) setStatus("详情已加载", "success");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setBusy(false);
        }
    };

    const uploadImage = async (event) => {
        event.preventDefault();
        const file = el.imageFile.files[0];
        if (!file) {
            setStatus("请选择图片文件", "error");
            return;
        }
        if (!el.activityId.value) {
            setStatus("请填写活动ID", "error");
            return;
        }

        const metadata = {
            activityId: Number(el.activityId.value),
            usageType: el.usageType.value.trim() || null,
            uploadedBy: el.uploadedBy.value.trim() || null
        };
        const formData = new FormData();
        formData.append("file", file);
        formData.append("activityId", String(metadata.activityId));
        formData.append(
            "metadata",
            new Blob([JSON.stringify(metadata)], { type: "application/json" })
        );

        setBusy(true);
        setStatus("上传中...");
        try {
            const response = await fetch(endpoints.upload, {
                method: "POST",
                body: formData
            });
            const payload = await response.json().catch(() => null);
            if (!response.ok || !payload || payload.status >= 400) {
                throw new Error(payload?.message || `上传失败：${response.status}`);
            }
            el.uploadForm.reset();
            state.selectedId = payload.data?.id || null;
            await loadImages();
            setStatus("上传成功", "success");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setBusy(false);
        }
    };

    const downloadImage = async (id) => {
        if (!id) return;
        setBusy(true);
        setStatus("下载中...");
        try {
            const response = await fetch(endpoints.download, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id })
            });
            if (!response.ok) {
                const payload = await response.json().catch(() => null);
                throw new Error(payload?.message || `下载失败：${response.status}`);
            }

            const blob = await response.blob();
            const detail = state.selectedImage?.id === id
                ? state.selectedImage
                : state.images.find((image) => image.id === id);
            const filename = detail?.originalFilename || detail?.storedFilename || `image-${id}`;
            const blobUrl = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = blobUrl;
            anchor.download = filename;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            URL.revokeObjectURL(blobUrl);
            setStatus("下载已开始", "success");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setBusy(false);
        }
    };

    const deleteImage = async (id) => {
        if (!id) return;
        const detail = state.selectedImage || state.images.find((image) => image.id === id);
        const name = detail?.originalFilename || `ID ${id}`;
        if (!window.confirm(`删除图片「${name}」？`)) return;

        setBusy(true);
        setStatus("删除中...");
        try {
            await postJson(endpoints.remove, { id });
            state.selectedId = null;
            await loadImages();
            setStatus("删除成功", "success");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setBusy(false);
        }
    };

    el.uploadForm.addEventListener("submit", uploadImage);
    el.refreshButton.addEventListener("click", loadImages);
    el.searchInput.addEventListener("input", renderList);
    el.detailDownloadButton.addEventListener("click", () => downloadImage(state.selectedId));
    el.detailDeleteButton.addEventListener("click", () => deleteImage(state.selectedId));
    el.detailOpenButton.addEventListener("click", () => {
        if (state.selectedImage?.accessUrl) {
            window.open(state.selectedImage.accessUrl, "_blank", "noopener");
        }
    });

    loadImages();
})();
</script>
</body>
</html>
